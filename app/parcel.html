<!DOCTYPE html><html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>DC Site Copilot — Parcel Finder</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<style>
 :root{--ink:#10243e;--blue:#1f6feb;--pos:#2e7d32}
 *{box-sizing:border-box}html,body{margin:0;height:100%;font-family:Arial,Helvetica,sans-serif;color:var(--ink)}
 #map{position:absolute;inset:0}
 header{position:fixed;top:0;left:0;right:0;height:50px;background:var(--ink);color:#fff;display:flex;align-items:center;gap:14px;padding:0 16px;z-index:1000}
 header h1{font-size:17px;margin:0}header a{color:#cfe0f5;font-size:12px;margin-left:auto;text-decoration:none}
 #panel{position:fixed;top:62px;left:12px;width:340px;max-height:calc(100vh - 76px);overflow:auto;background:#fff;border-radius:12px;box-shadow:0 6px 28px rgba(0,0,0,.3);z-index:1000;padding:16px}
 label{font-size:12px;color:#5a6b80;font-weight:bold;display:block;margin-top:8px}
 input{width:100%;padding:9px;margin-top:3px;border:1px solid #ccd4df;border-radius:6px;font-size:14px}
 button{width:100%;background:var(--blue);color:#fff;border:none;padding:11px;border-radius:8px;font-size:14px;font-weight:bold;cursor:pointer;margin-top:14px}
 .step{font-size:11px;text-transform:uppercase;letter-spacing:.05em;color:#8a98ab;font-weight:bold;margin:2px 0 8px}
 h2{font-size:18px;margin:0 0 2px}.sub{color:#5a6b80;font-size:12px;margin-bottom:8px}
 .cty{border:1px solid #e4e9f0;border-radius:8px;padding:9px 11px;margin:7px 0;cursor:pointer}
 .cty:hover{background:#f4f8ff;border-color:#b8d4ff}.cty .n{font-weight:bold}.cty .s{float:right;font-weight:bold;color:var(--pos)}
 .cty .c{font-size:11px;color:#7a899c;margin-top:3px}
 .pill{display:inline-block;font-size:11px;padding:2px 7px;border-radius:10px;background:#eef3fa;color:#46586e;margin:2px 3px 0 0}
 .res .row{display:flex;justify-content:space-between;font-size:13px;padding:4px 0;border-bottom:1px solid #f0f2f5}
 .res .row b{color:#5a6b80}
 .muted{color:#7a899c;font-size:11px}.back{color:var(--blue);cursor:pointer;font-size:12px;margin-bottom:8px;display:inline-block}
 .spin{text-align:center;color:#5a6b80;font-size:13px;padding:18px}
 img.render{width:100%;border-radius:8px;margin-top:10px;border:1px solid #e4e9f0}
 .dl{display:block;text-align:center;background:#10243e;color:#fff;padding:9px;border-radius:8px;text-decoration:none;margin-top:10px;font-size:13px;font-weight:bold}
 .lgd{position:fixed;bottom:12px;left:12px;background:#fff;border-radius:8px;padding:8px 11px;font-size:11px;z-index:1000;box-shadow:0 2px 10px rgba(0,0,0,.2)}
 .lgd i{display:inline-block;width:11px;height:11px;border-radius:2px;margin-right:4px;vertical-align:-1px}
</style></head><body>
<header><h1>🏗 DC Site Copilot — Parcel Finder</h1><a href="/">← statewide map</a></header>
<div id="map"></div>
<div id="panel"></div>
<div class="lgd" id="lgd" style="display:none"></div>
<script>
const map=L.map('map',{zoomControl:true}).setView([37.7,-78.6],7);
L.tileLayer('https://{s}.google.com/vt/lyrs=y&x={x}&y={y}&z={z}',{maxZoom:20,subdomains:['mt0','mt1','mt2','mt3'],attribution:'&copy; Google'}).addTo(map);
const P=document.getElementById('panel'); let parcelLayer=null, conLayers=[], needAcres=0;

function step1(){
 P.innerHTML=`<div class="step">Step 1 · Your project</div><h2>What are you building?</h2>
  <div class="sub">We rank Virginia's 95 counties, then find parcels with the acreage + infrastructure you need.</div>
  <label>Capacity (MW)</label><input id="mw" type="number" value="100">
  <label>Building size (sq ft) — optional</label><input id="sqft" type="number" placeholder="e.g. 250000">
  <label>Budget — optional</label><input id="budget" type="text" placeholder="e.g. $500M">
  <button onclick="findCounties()">Find best counties →</button>`;
}
function findCounties(){
 const mw=document.getElementById('mw').value, sqft=document.getElementById('sqft').value, budget=document.getElementById('budget').value;
 P.innerHTML='<div class="spin">⏳ Ranking counties…</div>';
 fetch(`/api/recommend?mw=${mw}&sqft=${sqft}&budget=${encodeURIComponent(budget)}`).then(r=>r.json()).then(d=>{
  needAcres=(d.acres_needed&&d.acres_needed.acres_needed)||d.min_acres||0;
  const ranked=d.ranked||[];
  let h=`<div class="step">Step 2 · Best counties</div><h2>Top matches</h2>
   <div class="sub">~${needAcres} acres needed${mw?` for ${mw} MW`:''}. Pick a county to see its parcels.</div>`;
  ranked.slice(0,10).forEach(c=>{
   const comp=c.components||{};
   const tags=Object.keys(comp).slice(0,4).map(k=>`<span class="pill">${k}: ${comp[k]}</span>`).join('');
   h+=`<div class="cty" onclick="loadCounty('${c.fips}','${(c.name||'').replace(/'/g,'')}')">
     <span class="s">${c.site_score!=null?c.site_score:(c.score||'')}</span><span class="n">${c.name}</span>
     <div class="c">${c.why||''}</div>${tags}</div>`;
  });
  h+=`<div class="back" onclick="step1()" style="margin-top:10px">← change inputs</div>`;
  P.innerHTML=h;
 }).catch(e=>{P.innerHTML='<div class="spin">Error ranking counties. <div class="back" onclick="step1()">← back</div></div>';});
}
function clearLayers(){ if(parcelLayer){map.removeLayer(parcelLayer);parcelLayer=null;} conLayers.forEach(l=>map.removeLayer(l));conLayers=[]; }
function loadCounty(fips,name){
 clearLayers();
 P.innerHTML=`<div class="spin">⏳ Loading parcels in ${name}…</div>`;
 fetch(`/api/parcels?fips=${fips}&min_acres=${needAcres}`).then(r=>r.json()).then(fc=>{
  parcelLayer=L.geoJSON(fc,{
   style:f=>({color:f.properties.suitable?'#2e7d32':'#888',weight:1,fillColor:f.properties.suitable?'#2e7d32':'#bbb',fillOpacity:f.properties.suitable?.45:.12}),
   onEachFeature:(f,l)=>{l.on('click',()=>runPipeline(f,l));
     l.bindTooltip(`${f.properties.acreage?Math.round(f.properties.acreage)+' ac':''}${f.properties.suitable?' ✓ fits':''}`);}
  }).addTo(map);
  try{map.fitBounds(parcelLayer.getBounds(),{padding:[30,30]});}catch(e){}
  const tot=(fc.features||[]).length, fit=(fc.features||[]).filter(f=>f.properties.suitable).length;
  document.getElementById('lgd').style.display='block';
  document.getElementById('lgd').innerHTML='<i style="background:#2e7d32"></i>fits ≥'+needAcres+' ac &nbsp; <i style="background:#bbb"></i>too small';
  P.innerHTML=`<div class="step">Step 3 · Pick a parcel</div><h2>${name}</h2>
   <div class="sub"><b>${fit}</b> of ${tot} parcels have ≥ ${needAcres} acres (green). Click a green parcel to run the site analysis.</div>
   <div class="back" onclick="findCounties()">← back to counties</div>`;
 }).catch(e=>{P.innerHTML=`<div class="spin">Error loading parcels. <div class="back" onclick="findCounties()">← back</div></div>`;});
}
function runPipeline(feat,layer){
 conLayers.forEach(l=>map.removeLayer(l));conLayers=[];
 try{map.fitBounds(layer.getBounds(),{padding:[60,60]});}catch(e){}
 P.innerHTML='<div class="spin">⏳ Running site pipeline…<br><span class="muted">wetlands · flood · setbacks · nearest dwelling · AutoCAD · AI render</span></div>';
 fetch('/api/pipeline',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(feat)}).then(r=>r.json()).then(d=>{
  const co=d.constraints||{}; const add=(g,style)=>{if(g&&g.features&&g.features.length){const l=L.geoJSON(g,{style:()=>style}).addTo(map);conLayers.push(l);}};
  add(co.buildable,{color:'#2e7d32',weight:2,fillColor:'#2e7d32',fillOpacity:.4});
  add(co.wetlands,{color:'#0aa',weight:1,fillColor:'#0aa',fillOpacity:.45});
  add(co.flood,{color:'#1f6feb',weight:1,fillColor:'#1f6feb',fillOpacity:.35});
  if(d.dwelling&&d.dwelling.line){const l=L.geoJSON(d.dwelling.line,{style:()=>({color:'#c62828',weight:3,dashArray:'5 5'})}).addTo(map);conLayers.push(l);}
  // overlay the AI data-center render on the parcel/buildable footprint, on the map
  if(d.image_url){try{var io=L.imageOverlay(d.image_url,layer.getBounds(),{opacity:.92,interactive:true});io.addTo(map);conLayers.push(io);}catch(e){}}
  // auto-download the AutoCAD DXF as soon as it's generated
  if(d.dxf_url){try{var a=document.createElement('a');a.href=d.dxf_url;a.download=d.dxf_url.split('/').pop();document.body.appendChild(a);a.click();a.remove();}catch(e){}}
  const s=d.summary||{};
  const row=(k,v)=>v!=null?`<div class="row"><b>${k}</b><span>${v}</span></div>`:'';
  let h=`<div class="step">Site analysis</div><h2>Parcel report</h2><div class="res">
   ${row('Parcel acres',s.parcel_acres)}${row('Buildable acres',s.buildable_acres)}${row('Buildable %',s.buildable_pct)}
   ${row('Wetlands (ac)',s.wetland_acres)}${row('Flood SFHA (ac)',s.flood_sfha_acres)}
   ${row('Nearest dwelling (ft)',(d.dwelling&&d.dwelling.nearest_dwelling_ft)||s.nearest_dwelling_ft)}</div>`;
  if(d.image_url) h+=`<img class="render" src="${d.image_url}" alt="AI render of proposed data center">`;
  if(d.dxf_url) h+=`<a class="dl" href="${d.dxf_url}" download>⬇ Download AutoCAD DXF</a>`;
  h+=`<div class="muted" style="margin-top:8px">Map: green=buildable · teal=wetlands · blue=flood · red dashed=nearest dwelling. AI-generated demo — verify against source.</div>
   <div class="back" onclick="P.scrollTop=0" style="margin-top:6px">click another parcel for a new report</div>`;
  P.innerHTML=h;
 }).catch(e=>{P.innerHTML='<div class="spin">Pipeline error (some live data sources may be slow). Try another parcel.<div class="back" onclick="P.scrollTop=0">ok</div></div>';});
}
step1();
</script></body></html>
